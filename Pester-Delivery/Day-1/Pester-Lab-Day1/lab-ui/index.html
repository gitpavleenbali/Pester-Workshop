function explain(panelId,idx){
var panel=document.getElementById(panelId);
if(!panel)return;
if(panel.style.display==='block'){panel.style.display='none';return}
panel.style.display='block';
var t=window._tests[idx];
var name=t?t.name:'Unknown';
var code=t?t.code||'':'';
var lines=[];
lines.push('TEST: '+name);
lines.push('');
if(!code){lines.push('No code available.');panel.textContent=lines.join('\n');return}
if(code.match(/Mock\s/)){lines.push('PESTER: Mock');lines.push('  Replaces a real command with a fake so no real Azure/AD/API calls happen.');lines.push('');}
if(code.match(/Should\s+-Invoke/)){lines.push('PESTER: Should -Invoke');lines.push('  Verifies a mocked command was called. -Times N = exact count. -Times 0 = NOT called.');lines.push('');}
if(code.match(/Should\s+-Be\b/)){lines.push('PESTER: Should -Be');lines.push('  Asserts equality (case-insensitive). $actual | Should -Be $expected');lines.push('');}
if(code.match(/Should\s+-Throw/)){lines.push('PESTER: Should -Throw');lines.push('  Asserts the code in { } throws an exception. Use \'*pattern*\' for wildcard matching.');lines.push('');}
if(code.match(/Should\s+-Match/)){lines.push('PESTER: Should -Match');lines.push('  Regex pattern match on a string value.');lines.push('');}
if(code.match(/Should\s+-BeNullOrEmpty/)){lines.push('PESTER: Should -BeNullOrEmpty');lines.push('  Asserts the value is $null or an empty string/array.');lines.push('');}
if(code.match(/Should\s+-BeGreaterThan/)){lines.push('PESTER: Should -BeGreaterThan');lines.push('  Numeric comparison: actual must be > expected.');lines.push('');}
if(code.match(/Should\s+-Not\b/)){lines.push('PESTER: Should -Not');lines.push('  Negates the assertion. e.g. Should -Not -BeNullOrEmpty = must have a value.');lines.push('');}
if(code.match(/-ParameterFilter/)){lines.push('PESTER: -ParameterFilter');lines.push('  Routes different mock responses based on input. Same command, different data per call.');lines.push('');}
if(code.match(/-TestCases/)){lines.push('PESTER: -TestCases');lines.push('  Data-driven: one It block runs multiple times with different @{} data sets.');lines.push('');}
if(code.match(/BeforeAll|BeforeEach/)){lines.push('PESTER: Setup Block');lines.push('  BeforeAll = once before all tests. BeforeEach = before every test.');lines.push('');}
if(code.match(/Context\s/)){lines.push('PESTER: Context');lines.push('  Groups tests by scenario. Each Context can have its own mocks.');lines.push('');}
if(lines.length<=2){lines.push('Standard Pester assertion test.');}
panel.textContent=lines.join('\n');
}
